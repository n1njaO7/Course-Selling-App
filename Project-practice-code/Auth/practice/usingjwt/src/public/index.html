<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Practice page</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</head>
<body>
    <div>
        <input type="text" placeholder="Enter Username" id="signup-username">
        <input type="password" placeholder="Enter Password" id="signup-password">
        <button onclick="signup">Sign Up</button>
        <br>
        <input type="text" placeholder="Enter Username" id="signin-username">
        <input type="password" placeholder="Enter Password" id="signin-password">
        <button onclick="signin">Sign in</button>
    </div>
    <h4 id="userInfo">User Info : </h4>
    <button onclick="logout">Logout</button>
</body>
<script>
    async function signup(){
    const username = document.getElementById("signup-username").value 
    const password = document.getElementById("signup-password").value 
    const res = await axios.post("http://localhost:3000/signup",{
        username : username,
        password : password
    })
    console.log(res)
    alert("You have signed up")
    }
    async function signin(){
        const username = document.getElementById("signup-username").value 
        const password = document.getElementById("signup-password").value 
        const res = await axios.post("http://localhost:3000/signin",{
            username : username,
            password : password
        })
        localStorage.setItem("token",res.data.token)

        alert(res.data.message)
    }
    
</script>

</html>
